<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #222; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    .demo { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .demo pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; }
    .demo .item { background: #fff; padding: 0.75rem; border-radius: 6px; border: 1px solid #eee; }
    .label { font-weight: 600; color: #444; margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <h2>String Utilities Demo</h2>
  <div class="demo" id="demo-grid">
    <!-- JS will populate demo items -->
  </div>

  <h2>Raw Output</h2>
  <pre id="demo-output">Loading library demo...</pre>

  <script type="module">
    try {
      const lib = await import('./lib.js');
      const {
        name, version, description,
        slugify, truncate, camelCase, kebabCase, titleCase, wordWrap,
        stripHtml, escapeRegex, pluralize, levenshteinDistance
      } = lib;

      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';

      const demoData = {
        slugify: slugify('Hello World!'),
        truncate: truncate('Hello World', 8),
        camelCase: camelCase('foo-bar-baz'),
        kebabCase: kebabCase('fooBarBaz'),
        titleCase: titleCase('hello world from the library'),
        wordWrap: wordWrap('The quick brown fox jumps over the lazy dog', 12),
        stripHtml: stripHtml('<p>Hello &amp; <strong>world</strong></p>'),
        escapeRegex: escapeRegex('^a+b(c)?$'),
        pluralize_box: pluralize('box'),
        pluralize_lady: pluralize('lady'),
        levenshtein: levenshteinDistance('kitten', 'sitting')
      };

      const grid = document.getElementById('demo-grid');
      Object.entries(demoData).forEach(([k, v]) => {
        const item = document.createElement('div');
        item.className = 'item';
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = k;
        const pre = document.createElement('pre');
        pre.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
        item.appendChild(label);
        item.appendChild(pre);
        grid.appendChild(item);
      });

      document.getElementById('demo-output').textContent = JSON.stringify(demoData, null, 2);
      document.title = name + ' v' + version;
    } catch (err) {
      document.getElementById('demo-output').textContent = 'Failed to load demo: ' + err.message;
    }
  </script>
</body>
</html>
