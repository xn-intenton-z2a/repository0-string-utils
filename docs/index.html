<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0</title>
  <meta property="og:title" content="repository0">
  <meta property="og:description" content="An autonomous repository powered by agentic-lib">
  <meta property="og:type" content="website">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    a { color: #0366d6; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    .identity dt { font-weight: bold; color: #666; }
    .identity dd { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
    #demo-output { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 2rem; }
    .feature { margin: 1rem 0; padding: 1rem; border: 1px solid #eee; border-radius: 6px; }
    .feature h3 { margin-top: 0; }
    .label { font-weight: bold; margin-right: 0.5rem; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <h2>Library Demos</h2>
  <div id="demo-output">Loading library demo...</div>

  <h2>Features</h2>
  <div id="features"></div>

  <h2>About</h2>
  <p>This website uses the library. See <a href="https://github.com/xn-intenton-z2a/repository0">the repository</a> for source code and mission details.</p>

  <script type="module">
    try {
      const lib = await import('./lib.js');
      const {
        name,
        version,
        description,
        slugify,
        truncate,
        camelCase,
        kebabCase,
        titleCase,
        wordWrap,
        stripHtml,
        escapeRegex,
        pluralize,
        levenshtein,
        getIdentity
      } = lib;

      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';

      const demo = {
        slugify: slugify('Hello World!'),
        truncate: truncate('Hello World', 8),
        camelCase: camelCase('foo-bar-baz'),
        kebabCase: kebabCase('Foo Bar Baz'),
        titleCase: titleCase('hello world from library'),
        wordWrap: wordWrap('The quick brown fox jumps over the lazy dog', 12),
        stripHtml: stripHtml('<p>Hi &amp; welcome to <strong>repository0</strong></p>'),
        escapeRegex: escapeRegex('^hello.*(world)?$'),
        pluralize: pluralize('baby'),
        levenshtein: levenshtein('kitten', 'sitting'),
        identity: getIdentity()
      };

      document.getElementById('demo-output').textContent = JSON.stringify(demo, null, 2);

      // Show individual feature demos
      const featuresEl = document.getElementById('features');
      const createFeature = (title, input, output) => {
        const el = document.createElement('div');
        el.className = 'feature';
        el.innerHTML = `<h3>${title}</h3><div><span class="label">Input:</span><code>${escapeHtml(input)}</code></div><div><span class="label">Output:</span><code>${escapeHtml(output)}</code></div>`;
        return el;
      };

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      featuresEl.appendChild(createFeature('Slugify', 'Hello World!', demo.slugify));
      featuresEl.appendChild(createFeature('Truncate', 'Hello World', demo.truncate));
      featuresEl.appendChild(createFeature('camelCase', 'foo-bar-baz', demo.camelCase));
      featuresEl.appendChild(createFeature('kebabCase', 'Foo Bar Baz', demo.kebabCase));
      featuresEl.appendChild(createFeature('titleCase', 'hello world from library', demo.titleCase));
      featuresEl.appendChild(createFeature('wordWrap', 'The quick brown fox jumps over the lazy dog (width 12)', demo.wordWrap));
      featuresEl.appendChild(createFeature('stripHtml', '<p>Hi &amp; welcome</p>', demo.stripHtml));
      featuresEl.appendChild(createFeature('escapeRegex', '^hello.*(world)?$', demo.escapeRegex));
      featuresEl.appendChild(createFeature('pluralize', 'baby', demo.pluralize));
      featuresEl.appendChild(createFeature('levenshtein', 'kitten / sitting', demo.levenshtein));

      document.title = name + ' v' + version;
    } catch (e) {
      document.getElementById('lib-version').textContent = '(error)';
      document.getElementById('lib-description').textContent = e.message;
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
