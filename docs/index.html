<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0 - String Utils Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    #demo-output { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 2rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <h2>String Utilities Demo</h2>
  <div id="demo-output">Loading demo...</div>

  <h3>Examples</h3>
  <table>
    <thead><tr><th>Function</th><th>Input</th><th>Output</th></tr></thead>
    <tbody id="examples-body"></tbody>
  </table>

  <script type="module">
    try {
      const lib = await import('./lib.js');
      const { name, version, description, slugify, truncate, camelCase, kebabCase, titleCase, wordWrap, stripHtml, escapeRegex, pluralize, levenshtein } = lib;
      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';

      const examples = [
        ["slugify", "Hello World!", slugify("Hello World!")],
        ["truncate", "Hello World", truncate("Hello World", 8)],
        ["camelCase", "foo-bar-baz", camelCase("foo-bar-baz")],
        ["kebabCase", "Foo Bar Baz", kebabCase("Foo Bar Baz")],
        ["titleCase", "the quick BROWN fox", titleCase("the quick BROWN fox")],
        ["wordWrap", "This is a long line that will be wrapped at width 20.", wordWrap("This is a long line that will be wrapped at width 20.", 20)],
        ["stripHtml", "<p>Hello &amp; <strong>world</strong></p>", stripHtml("<p>Hello &amp; <strong>world</strong></p>")],
        ["escapeRegex", ".*?^$+[](){}\\|", escapeRegex(".*?^$+[](){}\\|")],
        ["pluralize", "box", pluralize("box")],
        ["levenshtein", "kitten vs sitting", levenshtein("kitten","sitting")]
      ];

      document.getElementById('demo-output').textContent = JSON.stringify({ name, version }, null, 2);
      const tbody = document.getElementById('examples-body');
      for (const [fn, inp, out] of examples) {
        const tr = document.createElement('tr');
        const tdFn = document.createElement('td'); tdFn.textContent = fn;
        const tdIn = document.createElement('td'); tdIn.textContent = inp;
        const tdOut = document.createElement('td'); tdOut.textContent = typeof out === 'string' ? out : JSON.stringify(out);
        tr.appendChild(tdFn); tr.appendChild(tdIn); tr.appendChild(tdOut);
        tbody.appendChild(tr);
      }

      document.title = name + ' v' + version;
    } catch (e) {
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
