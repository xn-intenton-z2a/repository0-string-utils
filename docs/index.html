<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    a { color: #0366d6; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    #demo-output { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 2rem; }
    .examples { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .example { background: #fff; border: 1px solid #eee; padding: 1rem; border-radius: 6px; }
    .example h3 { margin: 0 0 0.5rem 0; font-size: 1rem; }
    .example pre { background: #f6f6f6; padding: 0.5rem; border-radius: 4px; overflow:auto }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <h2>Output</h2>
  <div id="demo-output">Loading library...</div>

  <h2>Examples</h2>
  <div class="examples" id="examples"></div>

  <h2>About</h2>
  <p>This website uses the library. See <a href="https://github.com/xn-intenton-z2a/repository0">the repository</a> for source code and mission details.</p>

  <script type="module">
    try {
      const lib = await import('./lib.js');
      const { name, version, description, slugify, truncate, camelCase, kebabCase, titleCase, wordWrap, stripHtml, escapeRegex, pluralize, levenshtein } = lib;
      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';
      document.getElementById('demo-output').textContent = JSON.stringify({ name, version, description }, null, 2);

      const examples = [
        { title: 'slugify("Hello World!")', code: slugify('Hello World!') },
        { title: 'truncate("Hello World", 8)', code: truncate('Hello World', 8) },
        { title: 'camelCase("foo-bar-baz")', code: camelCase('foo-bar-baz') },
        { title: 'kebabCase("Foo Bar Baz")', code: kebabCase('Foo Bar Baz') },
        { title: 'titleCase("hello world from js")', code: titleCase('hello world from js') },
        { title: 'wordWrap(long text, 20)', code: wordWrap('This is a sample sentence to demonstrate word wrap behaviour across multiple lines.', 20) },
        { title: 'stripHtml("<p>Hello &amp; <strong>world</strong></p>")', code: stripHtml('<p>Hello &amp; <strong>world</strong></p>') },
        { title: 'escapeRegex(". + * ? ^ $ ( ) [ ]\\")', code: escapeRegex('.+*?^$()[]\\') },
        { title: 'pluralize("box")', code: pluralize('box') },
        { title: 'levenshtein("kitten","sitting")', code: levenshtein('kitten','sitting') }
      ];

      const container = document.getElementById('examples');
      for (const ex of examples) {
        const el = document.createElement('div'); el.className = 'example';
        el.innerHTML = `<h3>${ex.title}</h3><pre>${String(ex.code)}</pre>`;
        container.appendChild(el);
      }
    } catch (e) {
      document.getElementById('lib-version').textContent = '(error)';
      document.getElementById('lib-description').textContent = e.message;
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
