<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0</title>
  <meta property="og:title" content="repository0">
  <meta property="og:description" content="An autonomous repository powered by agentic-lib">
  <meta property="og:type" content="website">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    a { color: #0366d6; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    .identity dt { font-weight: bold; color: #666; }
    .identity dd { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
    #demo-output { background: #fff; color: #111; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 2rem; border: 1px solid #eee; }
    .feature { margin: 0.5rem 0; padding: 0.5rem; border-bottom: 1px dashed #eee; }
    .feature h3 { margin: 0 0 0.25rem 0; font-size: 1rem; }
    .feature .in { color: #0366d6; }
    .feature .out { color: #24292e; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <h2>String utilities demo</h2>
  <div id="demo-output">Loading library demo...</div>

  <h2>About</h2>
  <p>This website uses the library. See <a href="https://github.com/xn-intenton-z2a/repository0">the repository</a> for source code and mission details.</p>

  <script type="module">
    try {
      const lib = await import('./lib.js');
      const { name, version, description, slugify, truncate, camelCase, kebabCase, titleCase, wordWrap, stripHtml, escapeRegex, pluralize, levenshtein } = lib;
      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';
      document.title = name + ' v' + version;

      const demos = [
        { id: 'slugify', label: 'Slugify', input: 'Hello World!', out: slugify('Hello World!') },
        { id: 'truncate', label: 'Truncate', input: 'Hello World', out: truncate('Hello World', 8) },
        { id: 'camelCase', label: 'camelCase', input: 'foo-bar-baz', out: camelCase('foo-bar-baz') },
        { id: 'kebabCase', label: 'kebabCase', input: 'Foo Bar Baz', out: kebabCase('Foo Bar Baz') },
        { id: 'titleCase', label: 'titleCase', input: 'hello world', out: titleCase('hello world') },
        { id: 'wordWrap', label: 'wordWrap', input: 'The quick brown fox jumps over the lazy dog', out: wordWrap('The quick brown fox jumps over the lazy dog', 20) },
        { id: 'stripHtml', label: 'stripHtml', input: '<p>Hello &amp; <strong>world</strong></p>', out: stripHtml('<p>Hello &amp; <strong>world</strong></p>') },
        { id: 'escapeRegex', label: 'escapeRegex', input: 'a+b(c)?', out: escapeRegex('a+b(c)?') },
        { id: 'pluralize', label: 'pluralize', input: 'leaf', out: pluralize('leaf') },
        { id: 'levenshtein', label: 'levenshtein', input: ['kitten', 'sitting'], out: levenshtein('kitten', 'sitting') }
      ];

      let html = '';
      for (const d of demos) {
        html += `<div class="feature" id="feature-${d.id}">`;
        html += `<h3>${d.label}</h3>`;
        html += `<div><span class="in">in:</span> <code>${Array.isArray(d.input) ? d.input.join(', ') : d.input}</code></div>`;
        html += `<div><span class="out">out:</span> <code>${String(d.out)}</code></div>`;
        html += `</div>`;
      }
      document.getElementById('demo-output').innerHTML = html;
    } catch (e) {
      document.getElementById('lib-version').textContent = '(error)';
      document.getElementById('lib-description').textContent = e.message;
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
