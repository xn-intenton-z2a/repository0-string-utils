<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0 — String Utilities Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #222; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    .demo { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .box { background: #fff; border: 1px solid #eee; padding: 1rem; border-radius: 6px; }
    #demo-output { background: #0b1220; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; }
    dl { margin: 0; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <h2>String Utilities Demo</h2>
  <div class="demo">
    <div class="box">
      <h3>Examples</h3>
      <div id="demo-output">Loading library...</div>
    </div>
    <div class="box">
      <h3>Notes</h3>
      <p>This demo imports the real library module (<code>src/lib/main.js</code>) via <code>src/web/lib.js</code> and runs a set of example calls that illustrate each function.</p>
    </div>
  </div>

  <script type="module">
    try {
      const lib = await import('./lib.js');
      const {
        name, version, description,
        slugify, truncate, camelCase, kebabCase, titleCase,
        wordWrap, stripHtml, escapeRegex, pluralize, levenshtein
      } = lib;

      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';

      const examples = {
        slugify: slugify('Hello World!'),
        truncate: truncate('Hello World', 8),
        camelCase: camelCase('foo-bar-baz'),
        kebabCase: kebabCase('Foo Bar Baz'),
        titleCase: titleCase('hello world from library'),
        wordWrap: wordWrap('This is an example of word wrapping that will break into multiple lines when a width is provided', 24),
        stripHtml: stripHtml('<p>Hello &amp; <strong>world</strong></p>'),
        escapeRegex: escapeRegex('Hello.*+?^${}()|[]\\world'),
        pluralize: pluralize('baby'),
        levenshtein: levenshtein('kitten', 'sitting')
      };

      document.getElementById('demo-output').textContent = JSON.stringify(examples, null, 2);
      document.title = name + ' v' + version + ' — Demo';
    } catch (e) {
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
