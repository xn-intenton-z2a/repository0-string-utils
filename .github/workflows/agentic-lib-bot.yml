# .github/workflows/agentic-lib-bot.yml
#
# Discussions bot: responds to GitHub Discussions using the Copilot SDK.
# Checks thread + repo context, responds, and can escalate to the main
# workflow by dispatching agentic-lib-workflow.yml with a message parameter.
#
# In agentic-lib: discussion triggers are commented out, dry-run defaults to true.
# During init:

name: agentic-lib-bot
run-name: "agentic-lib-bot [${{ github.ref_name }}]"
concurrency:
  group: agentic-lib-bot-${{ github.event.discussion.node_id || github.run_id }}
  cancel-in-progress: false

on:
  discussion:
    types:
      - created
      - edited
      - answered
      - unanswered
  discussion_comment:
    types:
      - created
      - edited
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        default: ""
      discussion-url:
        type: string
        required: false
        default: ""
      message:
        type: string
        required: false
        default: ""
      model:
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      discussion-url:
        description: "Discussion URL to respond to"
        type: string
        required: false
        default: ""
      message:
        description: "Context message from supervisor or lifecycle event"
        type: string
        required: false
        default: ""
      model:
        description: "Copilot SDK model to use (empty = read from agentic-lib.toml)"
        type: choice
        required: false
        default: ""
        options:
          - ""
          - gpt-5-mini
          - claude-sonnet-4
          - gpt-4.1
      dry-run:
        description: "Skip all push/PR/merge operations"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  issues: write
  discussions: write
  actions: write

env:
  configPath: "agentic-lib.toml"

jobs:
  params:
    runs-on: ubuntu-latest
    outputs:
      model: ${{ steps.resolve.outputs.model }}
      dry-run: ${{ steps.resolve.outputs.dry-run }}
      discussion-url: ${{ steps.resolve.outputs.discussion-url }}
      message: ${{ steps.resolve.outputs.message }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          sparse-checkout: ${{ env.configPath }}
          sparse-checkout-cone-mode: false
      - id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const configPath = '${{ env.configPath }}';
            let toml = '';
            if (fs.existsSync(configPath)) toml = fs.readFileSync(configPath, 'utf8');
            const readToml = (key) => {
              const m = toml.match(new RegExp(`^\\s*${key}\\s*=\\s*"([^"]*)"`, 'm'));
              return m ? m[1] : '';
            };
            const resolve = (name, input, configKey, defaultValue) => {
              let value = input || '';
              let source = 'input';
              if (!value && configKey) {
                value = readToml(configKey);
                source = value ? 'config' : '';
              }
              if (!value) {
                value = defaultValue;
                source = 'default';
              }
              const configVal = configKey ? readToml(configKey) : 'N/A';
              core.info(`param ${name}: input='${input}' config='${configVal}' default='${defaultValue}' → '${value}' (source: ${source})`);
              core.setOutput(name, value);
              return value;
            };
            resolve('model', '${{ inputs.model }}', 'model', 'gpt-5-mini');
            resolve('dry-run', '${{ inputs.dry-run }}', null, 'true');
            resolve('discussion-url', '${{ inputs.discussion-url }}', null, '');
            resolve('message', '${{ inputs.message }}', null, '');

  respond:
    needs: params
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.respond.outputs.action }}
      action-arg: ${{ steps.respond.outputs.action-arg }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Self-init (agentic-lib dev only)
        if: hashFiles('scripts/self-init.sh') != '' && hashFiles('.github/agentic-lib/actions/agentic-step/package.json') == ''
        run: bash scripts/self-init.sh

      - name: Install agentic-step dependencies
        working-directory: .github/agentic-lib/actions/agentic-step
        run: |
          npm ci
          if [ -d "../../copilot" ]; then
            ln -sf "$(pwd)/node_modules" ../../copilot/node_modules
          fi

      - name: Read test command from config
        id: config
        shell: bash
        run: |
          if [ -f agentic-lib.toml ]; then
            TEST_CMD=$(grep '^\s*test\s*=' agentic-lib.toml | head -1 | sed 's/.*=\s*"\([^"]*\)".*/\1/')
          fi
          echo "test-command=${TEST_CMD:-npm ci && npm test}" >> $GITHUB_OUTPUT

      - name: Run tests before responding
        id: tests
        shell: bash
        run: |
          set +e
          ${{ steps.config.outputs.test-command }}
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=pass" >> $GITHUB_OUTPUT
          else
            echo "result=fail" >> $GITHUB_OUTPUT
          fi

      - name: Get discussion URL and trigger comment
        id: discussion-url
        uses: actions/github-script@v8
        with:
          script: |
            let url = '${{ inputs.discussion-url }}' || '';
            if (!url && context.payload.discussion) {
              url = context.payload.discussion.html_url;
            }
            core.setOutput('url', url);

            // Extract trigger comment info from event payload
            const comment = context.payload.comment;
            if (comment) {
              core.setOutput('comment-node-id', comment.node_id || '');
              core.setOutput('comment-created-at', comment.created_at || '');
              core.info(`Trigger comment: node_id=${comment.node_id}, created_at=${comment.created_at}`);
            } else {
              core.setOutput('comment-node-id', '');
              core.setOutput('comment-created-at', '');
            }

      - name: Skip if comment is from bot
        id: guard
        shell: bash
        run: |
          COMMENT_USER='${{ github.event.comment.user.login }}'
          if [ "$COMMENT_USER" = "github-actions[bot]" ] || [ "$COMMENT_USER" = "github-actions" ]; then
            echo "Bot comment detected — skipping to avoid self-reply loop"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Respond to discussion
        id: respond
        if: steps.discussion-url.outputs.url != '' && steps.guard.outputs.skip != 'true'
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          TEST_RESULT: ${{ steps.tests.outputs.result }}
          BOT_MESSAGE: ${{ inputs.message }}
        with:
          task: "discussions"
          config: ${{ env.configPath }}
          instructions: ".github/agents/agent-discussion-bot.md"
          discussion-url: ${{ steps.discussion-url.outputs.url }}
          comment-node-id: ${{ steps.discussion-url.outputs.comment-node-id }}
          comment-created-at: ${{ steps.discussion-url.outputs.comment-created-at }}
          model: ${{ needs.params.outputs.model }}

  dispatch-supervisor:
    needs: [params, respond]
    if: >-
      github.repository != 'xn-intenton-z2a/agentic-lib'
      && needs.respond.outputs.action == 'request-supervisor'
      && inputs.message == ''
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch supervisor workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run agentic-lib-workflow.yml \
            --repo "${{ github.repository }}" \
            -f mode=full \
            -f model="${{ needs.params.outputs.model }}" \
            -f message="${{ needs.respond.outputs.action-arg }}"
