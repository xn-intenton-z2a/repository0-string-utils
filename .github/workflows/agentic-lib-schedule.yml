# .github/workflows/agentic-lib-schedule.yml
#
# Changes the agentic-lib-workflow's cron schedule by editing the workflow file
# directly and pushing to main. Also updates the model setting in agentic-lib.toml.
#
# No trigger changes needed — uses workflow_call and workflow_dispatch only.

name: agentic-lib-schedule
run-name: "agentic-lib-schedule -> ${{ inputs.frequency }} (${{ inputs.model }}${{ inputs.profile && format(', profile={0}', inputs.profile) || '' }})"

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        default: ""
      frequency:
        description: "How often the workflow should run (empty = read from agentic-lib.toml)"
        required: false
        type: string
        default: ""
      model:
        description: "Copilot SDK model to use"
        required: false
        type: string
        default: ""
      profile:
        description: "Tuning profile"
        required: false
        type: string
        default: ""
      dry-run:
        description: "Skip commit and push"
        required: false
        type: string
        default: "false"
  workflow_dispatch:
    inputs:
      frequency:
        description: "How often the workflow should run (empty = read from agentic-lib.toml, maintenance = weekly + remove mission-complete + unlimited budget)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - "off"
          - "maintenance"
          - "weekly"
          - "daily"
          - "hourly"
          - "continuous"
      focus:
        description: "Focus mode (empty = read from agentic-lib.toml)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - "mission"
          - "maintenance"
      model:
        description: "Copilot SDK model to use (empty = read from agentic-lib.toml)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - gpt-5-mini
          - claude-sonnet-4
          - gpt-4.1
      profile:
        description: "Tuning profile"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - min
          - med
          - max
      dry-run:
        description: "Skip commit and push"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  params:
    runs-on: ubuntu-latest
    outputs:
      frequency: ${{ steps.resolve.outputs.frequency }}
      model: ${{ steps.resolve.outputs.model }}
      profile: ${{ steps.resolve.outputs.profile }}
      focus: ${{ steps.resolve.outputs.focus }}
      maintenance: ${{ steps.resolve.outputs.maintenance }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: agentic-lib.toml
          sparse-checkout-cone-mode: false
      - id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const tomlPath = 'agentic-lib.toml';
            let tomlContent = '';
            if (fs.existsSync(tomlPath)) tomlContent = fs.readFileSync(tomlPath, 'utf8');
            const readToml = (key) => {
              const m = tomlContent.match(new RegExp(`^\\s*${key}\\s*=\\s*"([^"]*)"`, 'm'));
              return m ? m[1] : '';
            };
            let frequency = context.payload.inputs?.['frequency'] || '';
            if (!frequency) frequency = readToml('supervisor') || 'off';
            const model = context.payload.inputs?.['model'] || '';
            const profile = context.payload.inputs?.['profile'] || '';
            let focus = context.payload.inputs?.['focus'] || '';
            if (!focus) focus = readToml('focus') || 'mission';
            if (frequency === 'maintenance') focus = 'maintenance';
            core.setOutput('frequency', frequency);
            core.setOutput('model', model);
            core.setOutput('profile', profile);
            core.setOutput('focus', focus);
            core.setOutput('maintenance', frequency === 'maintenance' ? 'true' : 'false');

  update-schedule:
    needs: [params]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        if: inputs.dry-run == 'true' || inputs.dry-run == true
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/checkout@v6
        if: inputs.dry-run != 'true' && inputs.dry-run != true
        with:
          ref: ${{ inputs.ref || 'main' }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Update workflow schedule and model
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const frequency = '${{ needs.params.outputs.frequency }}';
            const focus = '${{ needs.params.outputs.focus }}';
            const tomlPath = 'agentic-lib.toml';
            let model = '${{ inputs.model }}';
            if (!model && fs.existsSync(tomlPath)) {
              const toml = fs.readFileSync(tomlPath, 'utf8');
              const m = toml.match(/^\s*model\s*=\s*"([^"]*)"/m);
              if (m) model = m[1];
            }
            if (!model) model = 'gpt-5-mini';
            let profile = '${{ inputs.profile }}';
            if (!profile && fs.existsSync(tomlPath)) {
              const toml = fs.readFileSync(tomlPath, 'utf8');
              const m = toml.match(/^\s*profile\s*=\s*"([^"]*)"/m);
              if (m) profile = m[1];
            }

            const isMaintenance = frequency === 'maintenance';
            const effectiveFrequency = isMaintenance ? 'weekly' : frequency;

            // Shared schedule maps and helper (single source of truth)
            const { WORKFLOW_SCHEDULE_MAP, updateAllSchedules } = require('./.github/agentic-lib/scripts/schedule-utils.cjs');
            const logger = { info: core.info };

            const workflowCron = WORKFLOW_SCHEDULE_MAP[effectiveFrequency];

            // Check if the frequency is already set — skip if no-op (but never skip maintenance)
            const workflowPath = '.github/workflows/agentic-lib-workflow.yml';
            const supervisorRegex2 = /^\s*supervisor\s*=\s*"([^"]*)"/m;
            if (!isMaintenance && fs.existsSync(tomlPath)) {
              const currentToml = fs.readFileSync(tomlPath, 'utf8');
              const currentMatch = currentToml.match(supervisorRegex2);
              const currentFreq = currentMatch ? currentMatch[1] : '';
              const wfContent = fs.existsSync(workflowPath) ? fs.readFileSync(workflowPath, 'utf8') : '';
              const cronRegex = /- cron: "([^"]*)"/;
              const workflowCronMatch = wfContent.match(cronRegex);
              const currentCron = workflowCronMatch ? workflowCronMatch[1] : null;
              const configMatches = currentFreq === frequency;
              const workflowMatches = currentCron === workflowCron;
              if (configMatches && workflowMatches) {
                core.info(`Schedule already set to ${frequency} — no change needed`);
                return;
              }
            }

            // Update all three workflow files proportionally
            updateAllSchedules(effectiveFrequency, logger);

            // Stamp the workflow file with current date
            if (fs.existsSync(workflowPath)) {
              let content = fs.readFileSync(workflowPath, 'utf8');
              const dateStamp = `# Schedule updated: ${new Date().toISOString()}`;
              const stampRegex = /^# Schedule updated: .*/m;
              if (stampRegex.test(content)) {
                content = content.replace(stampRegex, dateStamp);
              } else {
                content = content.replace(/^(# .*\n)+/m, (match) => match + dateStamp + '\n');
              }
              fs.writeFileSync(workflowPath, content);
            }
            core.info(`Updated proportional schedules: workflow=${effectiveFrequency}, init=${effectiveFrequency}(proportional), test=${effectiveFrequency}(proportional)`);

            // Maintenance mode: remove mission-complete/failed signals
            if (isMaintenance) {
              for (const f of ['MISSION_COMPLETE.md', 'MISSION_FAILED.md']) {
                if (fs.existsSync(f)) {
                  fs.unlinkSync(f);
                  core.info(`Maintenance mode: removed ${f}`);
                }
              }
            }

            // Update agentic-lib.toml with model, supervisor, focus, and profile settings
            if (fs.existsSync(tomlPath)) {
              let toml = fs.readFileSync(tomlPath, 'utf8');

              const scheduleModelRegex = /(\[schedule\][^\[]*?)(^\s*model\s*=\s*"[^"]*")/m;
              if (scheduleModelRegex.test(toml)) {
                toml = toml.replace(scheduleModelRegex, `$1model = "${model}"`);
              } else if (toml.match(/^\[schedule\]/m)) {
                const supervisorLineRegex = /^(\s*supervisor\s*=\s*"[^"]*")(\s*#.*)?$/m;
                if (supervisorLineRegex.test(toml)) {
                  toml = toml.replace(supervisorLineRegex, `$1$2\nmodel = "${model}"`);
                } else {
                  toml = toml.replace(/^(\[schedule\].*)$/m, `$1\nmodel = "${model}"`);
                }
              }

              const scheduleSupervisorRegex = /(\[schedule\][^\[]*?)(^\s*supervisor\s*=\s*"[^"]*")/m;
              if (scheduleSupervisorRegex.test(toml)) {
                toml = toml.replace(scheduleSupervisorRegex, `$1supervisor = "${frequency}"`);
              }

              // Update focus
              const focusRegex = /^(\s*focus\s*=\s*)"[^"]*"/m;
              if (focusRegex.test(toml)) {
                toml = toml.replace(focusRegex, `$1"${focus}"`);
              } else if (toml.match(/^\[schedule\]/m)) {
                toml = toml.replace(/^(\s*supervisor\s*=\s*"[^"]*".*$)/m, `$1\nfocus = "${focus}"`);
              }

              if (profile) {
                const profileRegex = /(\[tuning\][^\[]*?)(^\s*profile\s*=\s*"[^"]*")/m;
                if (profileRegex.test(toml)) {
                  toml = toml.replace(profileRegex, `$1profile = "${profile}"`);
                }
              }

              // Maintenance mode: set transformation-budget to 0 (unlimited)
              if (isMaintenance) {
                const budgetRegex = /^(\s*transformation-budget\s*=\s*)\d+/m;
                if (budgetRegex.test(toml)) {
                  toml = toml.replace(budgetRegex, '$10');
                  core.info('Maintenance mode: set transformation-budget = 0 (unlimited)');
                }
              }

              fs.writeFileSync(tomlPath, toml);
              core.info(`Updated agentic-lib.toml: model=${model}, supervisor=${frequency}, focus=${focus}${profile ? ', profile=' + profile : ''}`);
            } else {
              core.warning('agentic-lib.toml not found — skipping config update');
            }

      - name: Commit and push
        if: github.repository != 'xn-intenton-z2a/agentic-lib' && inputs.dry-run != 'true' && inputs.dry-run != true
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          TOKEN_USER=$(gh api /user --jq '.login')
          TOKEN_ID=$(gh api /user --jq '.id')
          git config user.name "${TOKEN_USER}"
          git config user.email "${TOKEN_ID}+${TOKEN_USER}@users.noreply.github.com"
          FREQUENCY="${{ inputs.frequency }}"
          MODEL="${{ inputs.model }}"
          git add .github/workflows/agentic-lib-workflow.yml .github/workflows/agentic-lib-init.yml .github/workflows/agentic-lib-test.yml agentic-lib.toml
          # Stage removed mission files ONLY if maintenance mode deleted them
          if [ "$FREQUENCY" = "maintenance" ]; then
            git rm --ignore-unmatch MISSION_COMPLETE.md MISSION_FAILED.md 2>/dev/null || true
          fi
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          if [ "$FREQUENCY" = "maintenance" ]; then
            git commit -m "schedule: switch to maintenance mode (weekly, unlimited budget, mission reset)"
          else
            git commit -m "schedule: set to ${FREQUENCY}, model ${MODEL:-gpt-5-mini}"
          fi
          MAX_RETRIES=3
          PUSH_SUCCESS=""
          for attempt in $(seq 1 $MAX_RETRIES); do
            # Tiered conflict resolution (mirrors fix-stuck strategy)
            case $attempt in
              1)
                echo "=== Attempt 1: rebase (cleanest) ==="
                git pull --rebase origin main || {
                  echo "Rebase conflict on attempt 1 — aborting rebase"
                  git rebase --abort 2>/dev/null || true
                  sleep $((10 + RANDOM % 10))
                  continue
                }
                ;;
              2)
                echo "=== Attempt 2: merge (handles non-overlapping changes) ==="
                git pull --no-rebase origin main || {
                  echo "Merge conflict on attempt 2 — aborting merge"
                  git merge --abort 2>/dev/null || true
                  sleep $((20 + RANDOM % 10))
                  continue
                }
                ;;
              3)
                echo "=== Attempt 3: merge -X theirs (accept remote on conflict) ==="
                git pull -X theirs --no-rebase origin main || {
                  echo "Merge -X theirs failed on attempt 3"
                  git merge --abort 2>/dev/null || true
                  sleep $((30 + RANDOM % 10))
                  continue
                }
                ;;
            esac
            git push origin HEAD:refs/heads/main && { PUSH_SUCCESS="true"; break; }
            echo "Push failed on attempt $attempt"
            sleep $((attempt * 10 + RANDOM % 10))
          done
          if [ "$PUSH_SUCCESS" != "true" ]; then
            echo "::error::Failed to push after $MAX_RETRIES attempts"
            exit 1
          fi

      - name: "Problem 2 fix: Verify schedule registered with GitHub"
        if: github.repository != 'xn-intenton-z2a/agentic-lib' && inputs.dry-run != 'true' && inputs.dry-run != true
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          echo "Waiting 10s for GitHub to process the push..."
          sleep 10
          WORKFLOW_STATE=$(gh api "repos/${{ github.repository }}/actions/workflows/agentic-lib-workflow.yml" --jq '.state' 2>/dev/null || echo "unknown")
          echo "Workflow state: ${WORKFLOW_STATE}"
          if [ "$WORKFLOW_STATE" != "active" ]; then
            echo "::warning::Workflow state is '${WORKFLOW_STATE}', attempting to enable..."
            gh api "repos/${{ github.repository }}/actions/workflows/agentic-lib-workflow.yml/enable" -X PUT 2>/dev/null || true
            WORKFLOW_STATE=$(gh api "repos/${{ github.repository }}/actions/workflows/agentic-lib-workflow.yml" --jq '.state' 2>/dev/null || echo "unknown")
            echo "Workflow state after enable: ${WORKFLOW_STATE}"
          fi
          # Verify the cron was registered by checking the workflow definition
          FREQUENCY="${{ inputs.frequency }}"
          if [ "$FREQUENCY" != "off" ]; then
            echo "Verifying cron schedule is active..."
            gh api "repos/${{ github.repository }}/actions/workflows" --jq '.workflows[] | select(.name == "agentic-lib-workflow") | "state=\(.state)"' 2>/dev/null || true
          fi

      - name: Job Summary
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const summary = `## Job: update-schedule\n| Key | Value |\n|-----|-------|\n| Status | ${context.job.status || 'completed'} |\n| Frequency | ${{ inputs.frequency }} |\n| Model | ${{ inputs.model || 'default' }} |\n| Profile | ${{ inputs.profile || 'default' }} |`;
            core.summary.addRaw(summary).write();
