# .github/workflows/agentic-lib-update.yml
#
# Update agentic-lib to latest, extract workflows/actions/scripts, run tests,
# commit and push to main [skip ci]. Does NOT reseed or purge user content.
#
# In agentic-lib: schedule trigger is commented out.
# During init:

name: agentic-lib-update
run-name: "agentic-lib-update [${{ github.ref_name }}]"

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        default: ""
      dry-run:
        type: string
        required: false
        default: "false"
      skip-tests:
        type: string
        required: false
        default: "false"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Preview changes without committing"
        type: boolean
        required: false
        default: false

permissions: write-all

jobs:
  params:
    runs-on: ubuntu-latest
    outputs:
      dry-run: ${{ steps.resolve.outputs.dry-run }}
      skip-tests: ${{ steps.resolve.outputs.skip-tests }}
    steps:
      - id: resolve
        uses: actions/github-script@v8
        env:
          INPUT_DRY_RUN: ${{ inputs.dry-run }}
          INPUT_SKIP_TESTS: ${{ inputs.skip-tests }}
        with:
          script: |
            const resolve = (name, input, configKey, defaultValue) => {
              let value = input || '';
              let source = 'input';
              if (!value && configKey) {
                source = '';
              }
              if (!value) {
                value = defaultValue;
                source = 'default';
              }
              core.info(`param ${name}: input='${input}' default='${defaultValue}' → '${value}' (source: ${source})`);
              core.setOutput(name, value);
              return value;
            };
            resolve('dry-run', process.env.INPUT_DRY_RUN, null, 'false');
            resolve('skip-tests', process.env.INPUT_SKIP_TESTS, null, 'false');

  update:
    needs: [params]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        if: inputs.dry-run == 'true' || inputs.dry-run == true
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/checkout@v6
        if: inputs.dry-run != 'true' && inputs.dry-run != true
        with:
          ref: ${{ inputs.ref || 'main' }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update agentic-lib to latest
        run: npm update @xn-intenton-z2a/agentic-lib

      - name: Run init (update mode)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use local CLI if available (agentic-lib dev), otherwise npx
          if [ -f "bin/agentic-lib.js" ]; then
            node bin/agentic-lib.js init
          else
            npx @xn-intenton-z2a/agentic-lib init
          fi

      - run: npm install

      - name: Install agentic-step deps
        if: hashFiles('.github/agentic-lib/actions/agentic-step/package.json') != ''
        run: cd .github/agentic-lib/actions/agentic-step && npm ci

      - name: Install sub-project dependencies (agentic-lib dev only)
        if: hashFiles('src/actions/agentic-step/package.json') != ''
        run: cd src/actions/agentic-step && npm ci

      - name: Run tests
        if: inputs.skip-tests != 'true'
        run: npm test

      - name: Commit and push to main [skip ci]
        if: github.repository != 'xn-intenton-z2a/agentic-lib' && inputs.dry-run != 'true' && inputs.dry-run != true
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          TOKEN_USER=$(gh api /user --jq '.login')
          TOKEN_ID=$(gh api /user --jq '.id')
          git config user.name "${TOKEN_USER}"
          git config user.email "${TOKEN_ID}+${TOKEN_USER}@users.noreply.github.com"
          git add -A
          # Unstage log/screenshot/state files — these live on the agentic-lib-logs branch
          git reset HEAD -- 'intentïon.md' 'SCREENSHOT_INDEX.png' 2>/dev/null || true
          git reset HEAD -- agent-log-*.md 2>/dev/null || true
          git reset HEAD -- agentic-lib-state.toml 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          VERSION=$(npx @xn-intenton-z2a/agentic-lib version 2>/dev/null || echo "latest")
          git commit -m "update agentic-lib@${VERSION} [skip ci]"
          MAX_RETRIES=3
          PUSH_SUCCESS=""
          for attempt in $(seq 1 $MAX_RETRIES); do
            # Tiered conflict resolution (mirrors fix-stuck strategy)
            case $attempt in
              1)
                echo "=== Attempt 1: rebase (cleanest) ==="
                git pull --rebase origin main || {
                  echo "Rebase conflict on attempt 1 — aborting rebase"
                  git rebase --abort 2>/dev/null || true
                  sleep $((10 + RANDOM % 10))
                  continue
                }
                ;;
              2)
                echo "=== Attempt 2: merge (handles non-overlapping changes) ==="
                git pull --no-rebase origin main || {
                  echo "Merge conflict on attempt 2 — aborting merge"
                  git merge --abort 2>/dev/null || true
                  sleep $((20 + RANDOM % 10))
                  continue
                }
                ;;
              3)
                echo "=== Attempt 3: merge -X theirs (accept remote on conflict) ==="
                git pull -X theirs --no-rebase origin main || {
                  echo "Merge -X theirs failed on attempt 3"
                  git merge --abort 2>/dev/null || true
                  sleep $((30 + RANDOM % 10))
                  continue
                }
                ;;
            esac
            git push origin HEAD:refs/heads/main && { PUSH_SUCCESS="true"; break; }
            echo "Push failed on attempt $attempt"
            sleep $((attempt * 10 + RANDOM % 10))
          done
          if [ "$PUSH_SUCCESS" != "true" ]; then
            echo "::error::Failed to push after $MAX_RETRIES attempts"
            exit 1
          fi

      - name: Job Summary
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const summary = `## Job: update\n| Key | Value |\n|-----|-------|\n| Status | ${context.job.status || 'completed'} |\n| Dry Run | ${{ inputs.dry-run }} |`;
            core.summary.addRaw(summary).write();
