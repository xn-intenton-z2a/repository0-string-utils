<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0 - String Utilities & Schema Diff Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #222; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    #demo-output { background: #fff; border: 1px solid #eee; padding: 1rem; border-radius: 6px; white-space: pre-wrap; font-family: monospace; }
    #schema-diff-output { background: #f8f9fa; border: 1px solid #eee; padding: 1rem; border-radius: 6px; white-space: pre-wrap; font-family: monospace; margin-top: 1rem; }
    table { border-collapse: collapse; margin-top: 1rem; }
    td, th { border: 1px solid #ddd; padding: 0.5rem 1rem; }
    .section { margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <h2>String Utilities Demo</h2>
  <div id="demo-output">Loading demo...</div>

  <div class="section">
    <h2>JSON Schema Diff Demo</h2>
    <p>Shows the computed diff between two small example schemas (JSON and human-friendly text).</p>
    <div id="schema-inputs" style="display:flex; gap:1rem;">
      <div style="flex:1">
        <h3>Schema A</h3>
        <pre id="schema-a" style="background:#fff; padding:8px; border-radius:6px; border:1px solid #eee;">{}</pre>
      </div>
      <div style="flex:1">
        <h3>Schema B</h3>
        <pre id="schema-b" style="background:#fff; padding:8px; border-radius:6px; border:1px solid #eee;">{}</pre>
      </div>
    </div>
    <h3>Diff (JSON)</h3>
    <pre id="schema-diff-json" style="background:#111; color:#fff; padding:12px; border-radius:6px;"></pre>
    <h3>Diff (Text)</h3>
    <pre id="schema-diff-output">Computing...</pre>
  </div>

  <script type="module">
    try {
      const lib = await import('./lib.js');
      const { name, version, description, slugify, truncate, camelCase, kebabCase, titleCase, wordWrap, stripHtml, escapeRegex, pluralize, levenshtein, diffSchemas, formatChanges } = lib;
      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';

      const samples = {
        slugify: ['Hello World!', '  Multiple --- separators ---', 'Ärvíztűrő tükörfúrógép'],
        truncate: ['This is a long sentence that will be truncated', 'Short'],
        camelCase: ['hello world', 'snake_case_example', 'XMLHttpRequest'],
        kebabCase: ['HelloWorldExample', 'This is a test', 'foo_bar'],
        titleCase: ['this is a title', 'ANOTHER title'],
        wordWrap: ['Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed non risus.'],
        stripHtml: ['<p>Hello <strong>World</strong> &amp; friends</p>'],
        escapeRegex: ['file.*(test)?[0-9]'],
        pluralize: ['cat', 'baby', 'bus', 'person'],
        levenshtein: [['kitten','sitting'], ['flaw','lawn']]
      };

      function runDemo() {
        const out = {};
        out.slugify = samples.slugify.map(s => ({ input: s, out: slugify(s) }));
        out.truncate = samples.truncate.map(s => ({ input: s, out: truncate(s, 20) }));
        out.camelCase = samples.camelCase.map(s => ({ input: s, out: camelCase(s) }));
        out.kebabCase = samples.kebabCase.map(s => ({ input: s, out: kebabCase(s) }));
        out.titleCase = samples.titleCase.map(s => ({ input: s, out: titleCase(s) }));
        out.wordWrap = { input: samples.wordWrap[0], out: wordWrap(samples.wordWrap[0], 40) };
        out.stripHtml = samples.stripHtml.map(s => ({ input: s, out: stripHtml(s) }));
        out.escapeRegex = samples.escapeRegex.map(s => ({ input: s, out: escapeRegex(s) }));
        out.pluralize = samples.pluralize.map(s => ({ input: s, out: pluralize(s) }));
        out.levenshtein = samples.levenshtein.map(pair => ({ input: pair, out: levenshtein(pair[0], pair[1]) }));
        return out;
      }

      document.getElementById('demo-output').textContent = JSON.stringify(runDemo(), null, 2);
      document.title = name + ' v' + version + ' — Demo';

      // Schema diff demo
      const schemaA = {
        definitions: {
          address: { type: "object", properties: { street: { type: "string" } }, required: ["street"] }
        },
        type: "object",
        properties: {
          id: { type: "string" },
          addr: { $ref: "#/definitions/address" }
        },
        required: ["id"]
      };

      const schemaB = {
        definitions: {
          address: { type: "object", properties: { street: { type: "string" }, city: { type: "string" } }, required: ["street"] }
        },
        type: "object",
        properties: {
          id: { type: "string" },
          addr: { $ref: "#/definitions/address" },
          email: { type: "string" }
        },
        required: ["id", "email"]
      };

      document.getElementById('schema-a').textContent = JSON.stringify(schemaA, null, 2);
      document.getElementById('schema-b').textContent = JSON.stringify(schemaB, null, 2);

      const changes = diffSchemas(schemaA, schemaB);
      document.getElementById('schema-diff-json').textContent = JSON.stringify(changes, null, 2);
      document.getElementById('schema-diff-output').textContent = formatChanges(changes);

    } catch (e) {
      document.getElementById('demo-output').textContent = 'Failed to load demo: ' + e.message;
      document.getElementById('schema-diff-output').textContent = 'Failed to load schema diff demo: ' + e.message;
    }
  </script>
</body>
</html>
