# agentic-lib.toml — Configuration for agentic-lib workflows
#
# Locally: paths point to test/ so dry-run workflows operate on test fixtures.
# During init:

[schedule]
supervisor = "off"       # off | weekly | daily | hourly | continuous
focus = "mission"                 # mission | maintenance

[paths]
mission = "MISSION.md"
source = "src/lib/"
tests = "tests/unit/"
behaviour = "tests/behaviour/"
features = "features/"
library = "library/"
web = "src/web/"
docs = "docs/"
examples = "examples/"
readme = "README.md"
dependencies = "package.json"
contributing = "CONTRIBUTING.md"
library-sources = "SOURCES.md"

[execution]
test = "npm ci && npm test"

[limits]
# Override profile defaults here. Omit to use the active profile's values.
# max-feature-issues = 2
# max-maintenance-issues = 1
# max-attempts-per-branch = 3
# max-attempts-per-issue = 2
# features-limit = 2
# library-limit = 32

[tuning]
# Profile sets defaults for all tuning and limit knobs: min | med | max
# Profile definitions live in [profiles.*] sections below.
profile = "max"
#
# Model selection — each has different strengths:
#   gpt-5-mini      — Fast, cheap, supports reasoning-effort. Best for CI and iteration.
#   claude-sonnet-4  — Strong code quality, nuanced reasoning. Best for complex transforms.
#   gpt-4.1         — High capability, large context. Best for thorough analysis.
# Note: reasoning-effort only works with gpt-5-mini and o4-mini.
# For other models it is automatically skipped.
model = "gpt-5-mini"
#
# Override individual knobs below. Omit or comment out to use profile defaults.
# reasoning-effort = "low"       # low | medium | high | none (none = disable entirely)
infinite-sessions = false        # set to true for long sessions with compaction
# transformation-budget = 4      # max code-changing cycles per run (0 = unlimited)
# max-issues = 5
# stale-days = 14
# max-discussion-comments = 5
# session-timeout-ms = 480000    # LLM session timeout in ms (should be < workflow step timeout)
# max-tokens = 200000            # token budget — controls max tool calls (tokens / 5000)
# max-read-chars = 20000         # max chars per read_file result
# max-test-output = 4000         # max chars of test output in prompts
# max-file-listing = 30          # max files in directory listings (0 = unlimited)
# max-library-index = 2000       # max chars for library index summary
# max-fix-test-output = 8000     # max chars of failed run log in fix-code

# ─── Profile Definitions ────────────────────────────────────────────
# Each profile defines tuning and limits defaults. The active profile
# is set by [tuning].profile above. Override individual values in
# [tuning] or [limits] to deviate from the active profile.

[profiles.min]
# Fast, cheap — CI testing, quick validation.
reasoning-effort = "low"                # low | medium | high | none
infinite-sessions = false               # enable session compaction for long runs
transformation-budget = 16             # max code-changing cycles per run
max-issues = 5                        # max open issues fetched from GitHub
stale-days = 14                        # days since last activity before an issue is considered stale
max-discussion-comments = 3               # max recent discussion comments fetched
max-feature-issues = 1                     # max concurrent feature development issues
max-maintenance-issues = 1                 # max concurrent maintenance issues
max-attempts-per-branch = 2               # max transform attempts before abandoning a branch
max-attempts-per-issue = 1                 # max transform attempts before abandoning an issue
features-limit = 2                     # max feature files in features/ directory
library-limit = 8                      # max library entries in library/ directory
session-timeout-ms = 480000            # LLM session timeout in ms (8 min, below 10-min workflow step)
max-tokens = 200000                    # token budget for tool-call cap calculation
max-read-chars = 20000                 # max chars returned from read_file tool
max-test-output = 4000                 # max chars of test output in prompts
max-file-listing = 30                  # max files in directory listings (0 = unlimited)
max-library-index = 2000               # max chars for library index in prompts
max-fix-test-output = 8000             # max chars of failed run log in fix-code
review-issues-cap = 2                  # max issues reviewed per batch (conservative for 10 min timeout)
min-resolved-issues = 1                # mission-complete: minimum closed-as-RESOLVED issues
min-cumulative-transforms = 1          # mission-complete: minimum transform cycles
max-source-todos = 2                   # mission-complete: max TODO comments in src
acceptance-criteria-threshold = 75     # mission-complete: % acceptance criteria required

[profiles.med]
# Balanced — good results, middle ground.
reasoning-effort = "medium"            # low | medium | high | none
infinite-sessions = true               # enable session compaction for long runs
transformation-budget = 32             # max code-changing cycles per run
max-issues = 15                       # max open issues fetched from GitHub
stale-days = 30                        # days since last activity before an issue is considered stale
max-discussion-comments = 10              # max recent discussion comments fetched
max-feature-issues = 2                     # max concurrent feature development issues
max-maintenance-issues = 1                 # max concurrent maintenance issues
max-attempts-per-branch = 3               # max transform attempts before abandoning a branch
max-attempts-per-issue = 2                 # max transform attempts before abandoning an issue
features-limit = 4                     # max feature files in features/ directory
library-limit = 32                     # max library entries in library/ directory
session-timeout-ms = 480000            # LLM session timeout in ms (8 min, below 10-min workflow step)
max-tokens = 200000                    # token budget for tool-call cap calculation
max-read-chars = 50000                 # max chars returned from read_file tool
max-test-output = 10000                # max chars of test output in prompts
max-file-listing = 100                 # max files in directory listings (0 = unlimited)
max-library-index = 5000               # max chars for library index in prompts
max-fix-test-output = 15000            # max chars of failed run log in fix-code
review-issues-cap = 3                  # max issues reviewed per batch
min-resolved-issues = 2                # mission-complete: minimum closed-as-RESOLVED issues
min-cumulative-transforms = 1          # mission-complete: minimum transform cycles
max-source-todos = 1                   # mission-complete: max TODO comments in src
acceptance-criteria-threshold = 50     # mission-complete: % acceptance criteria required

[profiles.max]
# Thorough — maximum context for complex missions.
reasoning-effort = "high"              # low | medium | high | none
infinite-sessions = true               # enable session compaction for long runs
transformation-budget = 128           # max code-changing cycles per run
max-issues = 30                      # max open issues fetched from GitHub
stale-days = 90                        # days since last activity before an issue is considered stale
max-discussion-comments = 20              # max recent discussion comments fetched
max-feature-issues = 4                     # max concurrent feature development issues
max-maintenance-issues = 2                 # max concurrent maintenance issues
max-attempts-per-branch = 5               # max transform attempts before abandoning a branch
max-attempts-per-issue = 4                 # max transform attempts before abandoning an issue
features-limit = 8                     # max feature files in features/ directory
library-limit = 64                     # max library entries in library/ directory
session-timeout-ms = 480000            # LLM session timeout in ms (8 min, below 10-min workflow step)
max-tokens = 500000                    # token budget for tool-call cap calculation
max-read-chars = 100000                # max chars returned from read_file tool
max-test-output = 20000                # max chars of test output in prompts
max-file-listing = 0                   # max files in directory listings (0 = unlimited)
max-library-index = 10000              # max chars for library index in prompts
max-fix-test-output = 30000            # max chars of failed run log in fix-code
review-issues-cap = 4                  # max issues reviewed per batch (may need step timeout awareness)
min-resolved-issues = 3                # mission-complete: minimum closed-as-RESOLVED issues
min-cumulative-transforms = 2          # mission-complete: minimum transform cycles
max-source-todos = 0                   # mission-complete: max TODO comments in src
acceptance-criteria-threshold = 75     # mission-complete: % acceptance criteria required

[goals]
# W12/W13: Code coverage thresholds — stated in all code-changing prompts
min-line-coverage = 50             # minimum % line coverage required
min-branch-coverage = 30           # minimum % branch coverage required

[mission-complete]
# Thresholds for deterministic mission-complete declaration.
# All conditions must be met simultaneously.
min-resolved-issues = 1            # minimum closed-as-RESOLVED issues since init
max-source-todos = 0               # max TODO comments allowed in ./src (0 = none)
acceptance-criteria-threshold = 50 # percentage of acceptance criteria that must be met (0-100)
min-cumulative-transforms = 1      # minimum transform cycles completed
require-no-open-issues = true      # all issues must be closed
require-no-open-prs = true         # all PRs must be merged/closed
require-no-critical-gaps = true    # no critical implementation gaps

[bot]
log-prefix = "agent-log-"
log-branch = "agentic-lib-logs"
screenshot-file = "SCREENSHOT_INDEX.png"

[acceptance-criteria]
# Auto-generated from MISSION.md on init. Updated by implementation-review.
total = 8
1 = { text = "`fizzBuzz(15)` returns the correct 15-element array ending with \"FizzBuzz\"", met = false }
2 = { text = "`fizzBuzzSingle(3)` returns \"Fizz\"", met = false }
3 = { text = "`fizzBuzzSingle(5)` returns \"Buzz\"", met = false }
4 = { text = "`fizzBuzzSingle(15)` returns \"FizzBuzz\"", met = false }
5 = { text = "`fizzBuzzSingle(7)` returns \"7\"", met = false }
6 = { text = "`fizzBuzz(0)` returns `[]`", met = false }
7 = { text = "All unit tests pass", met = false }
8 = { text = "README documents usage with examples", met = false }

[init]
timestamp = "2026-03-21T00:28:40.432Z"
mode = "purge"
mission = "7-kyu-understand-fizz-buzz"
mission-type = "7-kyu-understand-fizz-buzz"
version = "7.4.33"
